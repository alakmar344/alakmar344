<svg fill="none" viewBox="0 0 800 240" width="800" height="240" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,700;1,600&amp;family=Crimson+Text&amp;family=IBM+Plex+Mono&amp;display=swap');
        
        .container {
          height: 240px;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          background: #F3F0E9;
          border-radius: 12px;
          overflow: hidden;
          position: relative;
          text-rendering: optimizeLegibility;
        }

        .header {
          position: absolute;
          top: 35px;
          left: 45px;
          display: flex;
          align-items: center;
          gap: 12px;
          font-family: 'IBM Plex Mono', monospace;
          color: #999;
          font-size: 10px;
          letter-spacing: 2.5px;
        }

        .line {
          width: 35px;
          height: 1px;
          background-color: #999;
        }

        .content {
          text-align: center;
          width: 100%;
          padding: 0 40px;
          box-sizing: border-box;
          margin-top: 10px;
        }

        .title {
          font-family: 'Crimson Pro', serif;
          font-weight: 700;
          font-size: 42px;
          color: #1A1A1A;
          margin: 0;
          line-height: 1.1;
        }

        .title .italic {
          color: #B84333;
          font-weight: 600;
          font-style: italic;
          display: inline-block;
          margin: 0 8px;
        }

        .description {
          font-family: 'Crimson Text', serif;
          font-size: 16px;
          color: #666;
          max-width: 580px;
          margin: 15px auto 0 auto;
          line-height: 1.4;
          letter-spacing: 0.2px;
        }

        .footer-lines {
          position: absolute;
          bottom: 35px;
          left: 45px;
          right: 45px;
          display: flex;
          align-items: center;
        }

        .footer-line-left {
          flex-grow: 1;
          height: 1px;
          background-color: #D1CEC7;
        }

        .vertical-rule {
          height: 35px;
          width: 1px;
          background-color: #D1CEC7;
          margin: 0 25px;
        }

        .symbol {
          color: #A3A098;
          font-family: 'Crimson Pro', serif;
          font-size: 20px;
          margin-right: 25px;
          line-height: 1;
        }

        .footer-line-right {
          flex-grow: 1;
          height: 1px;
          background-color: #D1CEC7;
        }
      </style>
      <div class="container">
        <div class="header">
          <div class="line"></div>
          ALAKMAR TEENWALA — FOUNDER &amp; LEAD ARCHITECT
        </div>
        
        <div class="content">
          <h1 class="title">
            What shall we <span class="italic">architect</span> today?
          </h1>
          <p class="description">
            Building complex systems with human-centric clarity, specializing in production-grade AI applications and zero-storage network security.
          </p>
        </div>

        <div class="footer-lines">
          <div class="footer-line-left"></div>
          <div class="vertical-rule"></div>
          <div class="symbol">§</div>
          <div class="footer-line-right"></div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
